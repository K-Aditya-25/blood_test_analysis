name = "vitals-api-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# Non-secret configuration (safe to commit).
# Set the deployed dashboard origin here so CORS allows it.
[vars]
ALLOWED_ORIGIN = "https://vitals-chi-eight.vercel.app"

# ---------------------------------------------------------------------------
# Secrets — set via CLI, NEVER in this file:
#
#   wrangler secret put TENSORIX_API_KEY
#
# These are encrypted at rest and only visible to the Worker runtime.
# They do NOT appear in code, git, or any Vercel environment variable.
# ---------------------------------------------------------------------------
